services:
  - type: web
    name: transaction-monitor
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn transaction_monitor.wsgi:application"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SETTINGS_MODULE
        value: "transaction_monitor.settings"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: transaction-monitor-db
          property: connectionString

databases:
  - name: transaction-monitor-db
    plan: free
