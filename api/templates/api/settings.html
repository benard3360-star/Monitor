{% extends "api/base.html" %}
{% block title %}Settings - AML Monitor{% endblock %}
{% block content %}
<h1>Settings</h1>
<div class="card">
    <label>Optimal Threshold <input id="threshold" type="number" step="0.000001" min="0" max="1"></label>
    <button id="save-btn">Save</button>
    <p id="msg"></p>
</div>
<script>
function csrf() {
    const m = document.cookie.match(/csrftoken=([^;]+)/);
    return m ? decodeURIComponent(m[1]) : "";
}
const thresholdInput = document.getElementById("threshold");
const msg = document.getElementById("msg");
fetch("/api/settings/", { credentials: "same-origin" }).then(r=>r.json()).then(data => thresholdInput.value = data.optimal_threshold);
document.getElementById("save-btn").addEventListener("click", async () => {
    const value = parseFloat(thresholdInput.value);
    const res = await fetch("/api/settings/", {
        method: "POST",
        credentials: "same-origin",
        headers: {"Content-Type":"application/json", "X-CSRFToken": csrf()},
        body: JSON.stringify({optimal_threshold: value})
    });
    const data = await res.json();
    msg.textContent = res.ok ? "Saved successfully." : (data.error || "Save failed.");
});
</script>
{% endblock %}
