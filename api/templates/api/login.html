<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in — FinGuard AML</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm mt-5">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3">FinGuard AML</h1>
                    <p class="text-muted small">Sign in to access monitoring and case management.</p>
                    {% if form.errors %}
                        <div class="alert alert-danger small">Invalid username or password.</div>
                    {% endif %}
                    <form method="post" action="/login/">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label" for="id_username">Username</label>
                            <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="id_password">Password</label>
                            <input type="password" name="password" id="id_password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Sign in</button>
                    </form>
                    <p class="small text-muted mt-3 mb-0">Use <code>python manage.py setup_aml_roles</code> to create groups and an admin user.</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
